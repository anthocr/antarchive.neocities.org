<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book</title>
    <link href="styles/style.css" rel="stylesheet" type="text/css" media="all">
    <link href="styles/media_view.css" rel="stylesheet" type="text/css" media="all">
    <link rel="icon" type="image/x-icon" href="images/favi.png">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ole&display=swap" rel="stylesheet">
    <!-- Scripts -->
    <script src="scripts/shared.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', (event) => {
            const content = document.querySelector("main");
            if (content) {
                const params = new URLSearchParams(window.location.search);
                const file = params.get('file'); // get the 'file' parameter from the URL

                const safeName = encodeURIComponent(file);
                fetch(`books/${safeName}.md`)
                    .then(response => response.text())
                    .then(text => {
                        const html = marked.parse(text);
                        content.innerHTML = html;
                    })
                    .catch(error => console.error('Error fetching markdown file:', error));
            }
        });
    </script>
</head>

<body>
    <div id="content">

        <!--Site Logo / Header-->
        <header>
        </header>

        <div id="center">
            <!--Main Content-->
            <button onclick="window.history.back()">&#9664; Go Back</button>

            <main>
                <!--Content Populates here-->
            </main>
        </div>
    </div>
</body>

</html>
